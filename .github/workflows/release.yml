name: release

on:
  push:
    tags: ['v*']

jobs:
  npm:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release
      id-token: write # OIDC for npm trusted publishing
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      # No registry-url: it would write an _authToken to .npmrc and force token
      # auth, which shadows OIDC trusted publishing. The default registry is npm.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # npm trusted publishing (OIDC) needs npm >= 11.5.1.
      - run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      - run: pnpm cli:build

      - run: pnpm --filter @weavster/cli typecheck

      - run: pnpm test

      # Assemble a clean publish directory: built dist + README + LICENSE and a
      # manifest with the workspace devDependency and scripts stripped. Publishing
      # from a directory (not a tarball) lets npm populate the per-version readme
      # that npmjs.com renders.
      - name: Prepare publish directory
        run: |
          mkdir -p "$RUNNER_TEMP/pub/dist"
          cp -r cli/dist/. "$RUNNER_TEMP/pub/dist/"
          cp cli/README.md LICENSE "$RUNNER_TEMP/pub/"
          node -e "const p=require('./cli/package.json'); delete p.devDependencies; delete p.scripts; require('fs').writeFileSync(process.env.RUNNER_TEMP + '/pub/package.json', JSON.stringify(p, null, 2) + '\n')"

      - name: Publish to npm (trusted publisher)
        run: npm publish --access public
        working-directory: ${{ runner.temp }}/pub

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          notes="$(awk "/^## \[${version}\]/{f=1;next} /^## \[/{f=0} f" CHANGELOG.md)"
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes "${notes:-Release $GITHUB_REF_NAME}"

  # Build the thin engine image (engine/Dockerfile) once per architecture on a
  # native runner — no QEMU, so each arm64 `cargo build` runs at full speed —
  # and push each by digest (untagged). The `docker-merge` job then assembles a
  # multi-arch manifest from both digests. Independent of the npm job; the build
  # itself is the engine's release validation. (Docker's "distribute build
  # across multiple runners" recipe.)
  docker:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write # push to ghcr.io/weavster-dev/*
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/weavster-dev/weavster-engine

      # Push the single-arch image by digest only (no tags); the merge job tags
      # the combined manifest. name-canonical keeps the digest under the image.
      - uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          file: engine/Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=ghcr.io/weavster-dev/weavster-engine,push-by-digest=true,name-canonical=true,push=true

      - name: export digest
        run: |
          mkdir -p "$RUNNER_TEMP/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "$RUNNER_TEMP/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  # Assemble the per-arch digests into one multi-arch manifest and push it with
  # the release version + `latest` tags.
  docker-merge:
    runs-on: ubuntu-latest
    needs: docker
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digest-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/weavster-dev/weavster-engine
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: create and push the manifest list
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/weavster-dev/weavster-engine@sha256:%s ' *)

      - name: inspect
        run: docker buildx imagetools inspect ghcr.io/weavster-dev/weavster-engine:${{ steps.meta.outputs.version }}
