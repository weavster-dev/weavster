name: Claude Code Dispatch

# Polls Linear for "On Deck" tickets and dispatches them to claude-work.yml
# Rename LINEAR_TEAM_KEY variable in GitHub repo settings to match your Linear team

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  dispatch-on-deck:
    runs-on: ubuntu-latest
    # Prevent overlapping poll runs from dispatching duplicates
    concurrency:
      group: claude-dispatch
      cancel-in-progress: false
    steps:
      - name: Fetch "On Deck" issues from Linear
        id: fetch
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          LINEAR_TEAM_KEY: ${{ vars.LINEAR_TEAM_KEY || 'WEA' }}
        run: |
          # Query Linear for issues in "On Deck" state, filtered by team
          RAW_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST https://api.linear.app/graphql \
            -H "Authorization: $LINEAR_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"query\": \"query { issues(filter: { state: { name: { eq: \\\"On Deck\\\" } }, team: { key: { eq: \\\"$LINEAR_TEAM_KEY\\\" } } }) { nodes { id identifier title description priority url labels { nodes { name } } } } }\"
            }")

          HTTP_CODE=$(echo "$RAW_RESPONSE" | tail -n1)
          RESPONSE=$(echo "$RAW_RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Linear API returned HTTP $HTTP_CODE"
            echo "$RESPONSE"
            exit 1
          fi

          # Check for GraphQL errors
          GQL_ERRORS=$(echo "$RESPONSE" | jq -r '.errors // empty')
          if [ -n "$GQL_ERRORS" ]; then
            echo "::error::Linear GraphQL error: $GQL_ERRORS"
            exit 1
          fi

          # Validate expected JSON structure
          if ! echo "$RESPONSE" | jq -e '.data.issues.nodes | type == "array"' > /dev/null 2>&1; then
            echo "::error::Unexpected Linear API response structure"
            echo "$RESPONSE" | jq .
            exit 1
          fi

          echo "$RESPONSE" | jq -r '.data.issues.nodes | .[] | @base64' > /tmp/linear_issues.txt

          if [ ! -s /tmp/linear_issues.txt ]; then
            echo "No On Deck issues found"
            echo "has_issues=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_issues=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch Claude work for each ticket
        if: steps.fetch.outputs.has_issues == 'true'
        env:
          GH_TOKEN: ${{ secrets.LINEAR_DISPATCH_TOKEN }}
        run: |
          while IFS= read -r encoded; do
            [ -z "$encoded" ] && continue

            ISSUE=$(echo "$encoded" | base64 -d)
            LINEAR_ID=$(echo "$ISSUE" | jq -r '.id')
            LINEAR_IDENTIFIER=$(echo "$ISSUE" | jq -r '.identifier')
            TITLE=$(echo "$ISSUE" | jq -r '.title')
            DESCRIPTION=$(echo "$ISSUE" | jq -r '.description // "No description provided"')
            URL=$(echo "$ISSUE" | jq -r '.url')
            PRIORITY=$(echo "$ISSUE" | jq -r '.priority')

            # Check if already dispatched by looking for a PR with this Linear identifier in the title
            EXISTING=$(gh pr list \
              --repo "$GITHUB_REPOSITORY" \
              --search "in:title $LINEAR_IDENTIFIER" \
              --state all \
              --json number \
              --jq 'length')

            if [ "$EXISTING" -gt 0 ]; then
              echo "Skipping $LINEAR_IDENTIFIER — PR already exists"
              continue
            fi

            echo "Dispatching Claude work for $LINEAR_IDENTIFIER: $TITLE"

            # Build JSON payload with jq to safely escape special characters in title/description
            DISPATCH_PAYLOAD=$(jq -n \
              --arg id "$LINEAR_ID" \
              --arg identifier "$LINEAR_IDENTIFIER" \
              --arg title "$TITLE" \
              --arg desc "$DESCRIPTION" \
              --arg url "$URL" \
              --arg priority "$PRIORITY" \
              '{
                event_type: "linear-work",
                client_payload: {
                  linear_id: $id,
                  linear_identifier: $identifier,
                  title: $title,
                  description: $desc,
                  url: $url,
                  priority: $priority
                }
              }')

            gh api repos/"$GITHUB_REPOSITORY"/dispatches \
              --method POST \
              --input - <<< "$DISPATCH_PAYLOAD"

          done < /tmp/linear_issues.txt
