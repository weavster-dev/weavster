name: Gemini CLI Code Review

on:
  pull_request_target:
    types: [labeled]
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created]
  issues:
    types: [opened, assigned]

jobs:
  # Respond to CodeRabbit reviews that request changes
  gemini-coderabbit-response:
    if: |
      github.event_name == 'pull_request_review' &&
      github.event.review.user.login == 'coderabbitai[bot]' &&
      github.event.review.state == 'changes_requested'
    runs-on: ubuntu-latest
    concurrency:
      group: gemini-review-${{ github.event.pull_request.number }}
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
      issues: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, rust-analyzer

      - name: Respond to CodeRabbit Review
        uses: google-github-actions/run-gemini-cli@v0
        env:
          ENABLE_LSP_TOOL: "1"
        with:
          api_key: ${{ secrets.GEMINI_API_KEY }}
          plugin_marketplaces: https://github.com/google-github-actions/gemini-cli-plugins-official.git
          plugins: rust-analyzer-lsp@gemini-cli-plugins-official
          prompt: |
            CodeRabbit has reviewed PR #${{ github.event.pull_request.number }}.
            Review state: ${{ github.event.review.state }}

            INSTRUCTIONS:
            1. Read CodeRabbit's full review comments on this PR
            2. For each comment, decide:
               a) AGREE: Fix the issue, commit the change
               b) DISAGREE: Reply explaining your reasoning clearly
            3. After making all fixes, run cargo fmt, cargo clippy, and cargo test
            4. Push the fixes to the PR branch
            5. Reply to CodeRabbit's comments summarizing what you fixed vs what you intentionally kept

            IMPORTANT:
            - When you disagree, explain the design decision clearly so CodeRabbit learns
            - Use @coderabbitai in replies so it picks up the feedback
            - Follow AGENTS.md conventions
            - Use conventional commits for fix commits

  # Handle @gemini-cli mentions in PR/Issue comments
  # Only responds to org members/collaborators to prevent token abuse
  gemini-respond:
    if: |
      github.event_name == 'issue_comment' &&
      contains(github.event.comment.body, '@gemini-cli') &&
      !contains(github.event.comment.body, '@gemini-cli work') &&
      (
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR'
      )
    runs-on: ubuntu-latest
    concurrency:
      group: gemini-respond-${{ github.event.issue.number }}
      cancel-in-progress: false
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rust-analyzer

      - name: Respond to mention
        uses: google-github-actions/run-gemini-cli@v0
        env:
          ENABLE_LSP_TOOL: "1"
        with:
          api_key: ${{ secrets.GEMINI_API_KEY }}
          plugin_marketplaces: https://github.com/google-github-actions/gemini-cli-plugins-official.git
          plugins: rust-analyzer-lsp@gemini-cli-plugins-official
          prompt: |
            REPO: ${{ github.repository }}
            ISSUE/PR NUMBER: ${{ github.event.issue.number }}
            COMMENT AUTHOR: ${{ github.event.comment.user.login }}
            COMMENT BODY: ${{ github.event.comment.body }}

            You were mentioned in a comment. Please help with whatever is being asked.

            Context:
            - This is the Weavster project (Rust-based ESB/data pipeline tool)
            - Check AGENTS.md for project conventions
            - You can view the issue/PR details and respond helpfully

            If this is a PR, you can:
            - Explain code changes
            - Suggest improvements
            - Help debug issues
            - Answer questions about the implementation

            If this is an issue, you can:
            - Help clarify requirements
            - Suggest implementation approaches
            - Break down into smaller tasks
            - Provide code examples

          claude_args: '--allowed-tools "Bash(gh issue view:*),Bash(gh issue comment:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*),Bash(gh api:*)"'

  # Help with newly created/assigned issues
  gemini-issue-assist:
    if: |
      github.event_name == 'issues' &&
      (github.event.action == 'opened' || github.event.action == 'assigned') &&
      contains(github.event.issue.labels.*.name, 'gemini-assist')
    runs-on: ubuntu-latest
    concurrency:
      group: gemini-assist-${{ github.event.issue.number }}
      cancel-in-progress: false
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rust-analyzer

      - name: Assist with issue
        uses: google-github-actions/run-gemini-cli@v0
        env:
          ENABLE_LSP_TOOL: "1"
        with:
          api_key: ${{ secrets.GEMINI_API_KEY }}
          plugin_marketplaces: https://github.com/google-github-actions/gemini-cli-plugins-official.git
          plugins: rust-analyzer-lsp@gemini-cli-plugins-official
          prompt: |
            REPO: ${{ github.repository }}
            ISSUE NUMBER: ${{ github.event.issue.number }}
            ISSUE TITLE: ${{ github.event.issue.title }}
            ISSUE BODY: ${{ github.event.issue.body }}
            ISSUE LABELS: ${{ join(github.event.issue.labels.*.name, ', ') }}

            This issue has the 'gemini-assist' label. Please help by:

            1. **Analyzing the Issue**
               - Understand what's being requested
               - Identify which crates are involved
               - Check for related issues or PRs

            2. **Creating an Implementation Plan**
               - Break down into subtasks if complex
               - Identify files that need changes
               - Note any dependencies or blockers

            3. **Providing Guidance**
               - Reference relevant code patterns from the repo
               - Suggest test cases to include
               - Note any architecture considerations

            Post a helpful comment with your analysis. Reference AGENTS.md for conventions.

            If this is a bug report:
            - Help reproduce the issue
            - Suggest debugging steps
            - Identify likely cause

            If this is a feature request:
            - Clarify scope and requirements
            - Suggest implementation approach
            - Estimate complexity (small/medium/large)

          claude_args: '--allowed-tools "Bash(gh issue view:*),Bash(gh issue comment:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr list:*),Bash(gh api:*)"'
