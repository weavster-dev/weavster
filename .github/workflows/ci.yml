name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Lint + format gate. Check-only — never writes. Local fixes happen via the
  # husky pre-commit hook (lint-staged); CI just fails on any violation.
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: lint
        run: pnpm lint

      - name: format check
        run: pnpm format:check

  cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @weavster/core build

      - run: pnpm cli:build

      - run: pnpm --filter @weavster/cli typecheck

      # Pre-download the Javy binary once. javy-cli fetches it on first use, and
      # vitest runs the compile test files in parallel workers — without this
      # they race the same download and one captures the "Downloading…" notice
      # as a compile error (flaky failure).
      - name: warm the Javy binary
        run: pnpm --filter @weavster/cli exec javy --version

      # Runs `coverage` in every workspace package that defines it. New JS/TS
      # packages (e.g. the UI) are picked up automatically once they add a
      # `coverage` script — no change needed here. (Lint runs in the `quality`
      # job; coverage runs the tests, so no separate lint/test step here.)
      - name: test with coverage
        run: pnpm -r coverage

      # No `files:` — Codecov auto-discovers every coverage/lcov.info under the
      # workspace, so new packages are uploaded without editing this step.
      # Path-based components in codecov.yml then categorize each one.
      - name: upload coverage to Codecov
        uses: codecov/codecov-action@v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: golden-path smoke
        run: |
          node cli/dist/index.js validate examples/golden-path
          node cli/dist/index.js test examples/golden-path

      - name: run smoke
        run: |
          cd examples/golden-path
          node "$GITHUB_WORKSPACE/cli/dist/index.js" run order
          test -f out/order.json

      - name: init smoke
        run: |
          node cli/dist/index.js init "$RUNNER_TEMP/wv-init"
          node cli/dist/index.js validate "$RUNNER_TEMP/wv-init"
          node cli/dist/index.js test "$RUNNER_TEMP/wv-init"

  # Rust engine (RFC 0003). Builds, lints, and tests the `engine/` workspace,
  # then uploads coverage with the `rust` flag. Self-gating: the steps no-op
  # until a Cargo.toml lands, so it stayed green before the crate existed.
  rust-engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: detect rust
        id: detect
        run: |
          if git ls-files '*Cargo.toml' | grep -q .; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "No Cargo.toml yet — skipping Rust build."
          fi

      - if: steps.detect.outputs.present == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview, clippy, rustfmt

      - if: steps.detect.outputs.present == 'true'
        name: build
        run: cargo build --workspace --locked

      - if: steps.detect.outputs.present == 'true'
        name: fmt
        run: cargo fmt --check

      - if: steps.detect.outputs.present == 'true'
        name: clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      # The artifact-driven engine tests (tests/artifact.rs) self-skip unless a
      # compiled golden-path artifact exists, and only the TS toolchain can
      # produce one. Build it here so coverage reflects the wasm host and run
      # loop, not just the manifest-failure paths. This is the only place Node
      # touches the engine — its build and image stay Node-free.
      - if: steps.detect.outputs.present == 'true'
        uses: pnpm/action-setup@v4

      - if: steps.detect.outputs.present == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - if: steps.detect.outputs.present == 'true'
        name: compile the golden-path artifact (for engine tests)
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @weavster/core build
          pnpm --filter @weavster/cli dev compile "$GITHUB_WORKSPACE/examples/golden-path"

      - if: steps.detect.outputs.present == 'true'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - if: steps.detect.outputs.present == 'true'
        name: test with coverage
        run: cargo llvm-cov --workspace --locked --lcov --output-path lcov.info

      - if: steps.detect.outputs.present == 'true'
        name: upload rust coverage to Codecov
        uses: codecov/codecov-action@v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./lcov.info
          flags: rust
