language: en-US
tone_instructions: >
  Be a thorough Rust code reviewer. Focus on correctness, safety, performance,
  and idiomatic Rust patterns. Reference CLAUDE.md conventions. Be direct and
  specific — explain WHY something should change, not just what.

reviews:
  profile: assertive
  high_level_summary: true
  review_status: true

  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main

  path_instructions:
    - path: "crates/weavster-core/**/*.rs"
      instructions: |
        This is a library crate with ZERO workspace dependencies. Enforce:
        - thiserror for all error types (NOT anyhow)
        - No .unwrap() or .expect() in non-test code
        - No imports from weavster-cli, weavster-runtime, or weavster-codegen
        - All public types/functions must have doc comments
        - Use tracing, not println! or log

    - path: "crates/weavster-cli/**/*.rs"
      instructions: |
        Application crate. Enforce:
        - anyhow for error handling with .context() on fallible operations
        - User-friendly error messages (no raw debug output)
        - Use tracing for logging

    - path: "crates/weavster-runtime/**/*.rs"
      instructions: |
        Must stay minimal for small Docker images. Review for:
        - Unnecessary dependencies (check Cargo.toml changes)
        - Only depends on weavster-core
        - Binary size impact of changes

    - path: "crates/weavster-codegen/**/*.rs"
      instructions: |
        Transform compilation crate (YAML -> Rust -> WASM). Review for:
        - Correct WASM target compatibility
        - Template safety (MiniJinja usage)

  path_filters:
    - "!target/**"
    - "!docs/node_modules/**"

  tools:
    clippy:
      enabled: true

knowledge_base:
  learnings:
    scope: auto

chat:
  auto_reply: true
