steps:
  - _rename:
      order.@id: id
  - _set:
      id: { _upper: $id }
      name: { _concat: { parts: [$first, $last], sep: ' ' } }
      createdAt: { _toIso: $order.createdAt }
  - _when:
      cond: { _eq: [$status, new] }
      then:
        - _set: { priority: high }
      else:
        - _set: { priority: normal }
  - _ts:
      module: enrich
