# Normalize an incoming order: uppercase the id, build a display name, set
# priority from status, then enrich with a custom function.
steps:
  - _set:
      id: { _upper: $id }
      name: { _concat: { parts: [$first, $last], sep: ' ' } }
  - _when:
      cond: { _eq: [$status, new] }
      then:
        - _set: { priority: high }
      else:
        - _set: { priority: normal }
  - _ts:
      module: initials
